version: 2

models:
  - name: stg_unified_events
    description: "Unified event stream combining all data eras (card system, places system, telemetry) into a single consistent format. As of Phase B.5 (Apr 2026), also carries normalized origin_surface for surface-based segmentation."
    columns:
      - name: user_id
        description: "User who performed the event"
      - name: event_timestamp
        description: "When the event occurred"
      - name: event_type
        description: "Normalized event type. Telemetry-era mappings cover every event the iOS TelemetryManager emits — see the CASE statement in stg_unified_events.sql telemetry_events CTE for the full list."
      - name: card_id
        description: "Card identifier (always TEXT)"
      - name: pack_id
        description: "Pack identifier if applicable"
      - name: source_table
        description: "Source table this event originated from"
      - name: data_era
        description: "Data era: card_system, places_system, or telemetry"
      - name: app_version
        description: "App version if available"
      - name: origin_surface_raw
        description: "Raw origin surface as emitted by iOS (e.g. featured_carousel, search_tab, chat_recommendations). Preserved for debugging; most consumers should use origin_surface instead."
      - name: origin_surface
        description: "Canonical origin surface — which part of the app triggered this event. Normalized from origin_surface_raw by collapsing sub-variants (featured_carousel/featured_spotlight/featured_category → featured, search_tab/search_view/deck_search → search, chat_recommendations → dextr, etc.). NULL for events that legitimately have no surface (onboarding, multiplayer lifecycle, board lifecycle, social graph, checklist, permission prompts)."
        tests:
          - accepted_values:
              arguments:
                values:
                  - dextr
                  - featured
                  - search
                  - mydecks
                  - shared_link
                  - multiplayer
                  - place_detail
                  - review
                  - whats_next
                  - import
                  - server
                  - unknown
                  - explore
                  - map
                  - mini_dextr
                  - other
              config:
                where: "origin_surface is not null"
      - name: origin_source_id
        description: "Context ID paired with origin_surface (e.g. pack_id when surface=dextr, board_id when surface=mydecks)."
      - name: event_category
        description: "High-level bucket for dashboard aggregation: AI, Swipe, Save, Share, Conversion, View, Session, Board, Social, Multiplayer, Navigation, FirstSession, Permission, Onboarding, Other."

  - name: stg_app_events_enriched
    description: "Dedup'd app_events joined to native + inferred session context, with Tier 1 property fields (origin_surface, action_type, share_channel, fast_path, etc.) extracted to typed columns. Primary source for surface-based analytics."
    columns:
      - name: id
        description: "Raw app_events.id (server-generated)"
      - name: client_event_id
        description: "Client-generated dedup key (preferred over id for dedup)"
      - name: event_name
        description: "Raw event_name from app_events"
      - name: event_timestamp
        description: "Event timestamp"
      - name: user_id
        description: "User who performed the event"
      - name: effective_session_id
        description: "Native session_id if present, else inferred session_id from stg_unified_sessions"
      - name: origin_surface_raw
        description: "Raw surface as emitted by iOS (preserved for debugging)"
      - name: origin_surface
        description: "Canonical normalized surface (same semantics as stg_unified_events.origin_surface)"
        tests:
          - accepted_values:
              arguments:
                values:
                  - dextr
                  - featured
                  - search
                  - mydecks
                  - shared_link
                  - multiplayer
                  - place_detail
                  - review
                  - whats_next
                  - import
                  - server
                  - unknown
                  - explore
                  - map
                  - mini_dextr
                  - other
              config:
                where: "origin_surface is not null"
      - name: origin_source_id
        description: "Context ID paired with origin_surface"
      - name: action_type
        description: "Sub-type for events that carry one (e.g. whats_next_tapped, place card actions)"
      - name: share_channel
        description: "Which share sheet button was used (native_share_sheet, copy_link, etc.)"
      - name: fast_path
        description: "Non-null for dextr queries from the suggestion pill fast path"
      - name: is_private
        description: "Board privacy at time of action (for board_created / board_viewed)"
      - name: places_count
        description: "Number of places in the context (multiplayer_created, board_viewed, etc.)"
      - name: save_method
        description: "How a place was saved: button_tap, long_press, swipe_up, board_selector, auto_save"
      - name: task_name
        description: "Which checklist task was completed (for checklist_task_completed events)"

  - name: stg_app_events_properties
    description: "Per-event typed property extraction — Tier 2 of Phase B.5. One row per dedup'd app_events row (same grain as stg_app_events_enriched). Carries every typed field we know how to extract for each event_name."
    columns:
      - name: id
        description: "app_events.id (server-generated)"
        tests:
          - not_null
      - name: event_name
        description: "Raw event_name"
      - name: origin_surface
        description: "Canonical surface (inherited from stg_app_events_enriched)"
      - name: place_name
        description: "Place name from card_saved / place_saved"
      - name: place_category
        description: "Place category from card_saved / place_saved"
      - name: save_method
        description: "How the save was initiated"
      - name: already_saved
        description: "True if the card was already saved to the destination board"
      - name: query_text
        description: "Dextr query text (dextr_query_submitted)"
      - name: results_count
        description: "Number of results returned (dextr_results_viewed)"
      - name: vote_type
        description: "Multiplayer vote type (multiplayer_voted)"
      - name: mp_session_title
        description: "Multiplayer session title (multiplayer_created)"
      - name: followed_user_id
        description: "The user who was followed (user_followed)"

  - name: int_place_resolver
    description: "Universal place identity resolver. Maps any card_id format (integer, deck_sku, google_place_id, UUID) to places.place_id (integer). Use this to join event-level card_ids to canonical place metadata."
    columns:
      - name: original_card_id
        description: "The raw card_id value from events (text)"
        tests:
          - not_null
          - unique
      - name: resolved_place_id
        description: "Resolved places.place_id (integer). NULL if unresolved (e.g., legacy experience_cards with no places match)."
      - name: resolution_method
        description: "How the card_id was resolved: integer, deck_sku, google_place_id, uuid_board_place, or unresolved"

  - name: stg_unified_sessions
    description: "Unified sessions combining inferred sessions (5-min timeout) and native planning sessions."
    columns:
      - name: session_id
        description: "Unique session identifier"
      - name: user_id
        description: "User who owns the session"
      - name: started_at
        description: "Session start timestamp"
      - name: ended_at
        description: "Session end timestamp"
      - name: session_date
        description: "Date the session started"
      - name: session_week
        description: "Week the session started"
      - name: session_duration_seconds
        description: "Duration in seconds"
      - name: event_count
        description: "Total events in the session"
      - name: query_count
        description: "Number of AI queries"
      - name: swipe_count
        description: "Number of swipes"
      - name: save_count
        description: "Number of saves"
      - name: share_count
        description: "Number of shares"
      - name: unique_cards_interacted
        description: "Distinct cards interacted with"
      - name: session_source
        description: "Whether session is 'inferred' or 'native'"
      - name: has_native_session_id
        description: "TRUE if from native planning_sessions"
      - name: data_era
        description: "Data era of the session"
      - name: is_genuine_planning_attempt
        description: "TRUE if session had at least one prompt, save, or share"

  - name: stg_session_swipes
    description: "Per-session swipe aggregate (telemetry era) with per-origin_surface pivots. Grain: one row per (session_id, user_id). Downstream: fct_session_outcomes, fct_surface_performance."
    columns:
      - name: session_id
        description: "Native session_id"
        tests:
          - not_null
      - name: user_id
        description: "User who swiped"
        tests:
          - not_null
      - name: total_swipe_count
        description: "All swipes in the session (right + left)"
      - name: right_swipe_count
        description: "Right swipes (likes)"
      - name: left_swipe_count
        description: "Left swipes (dislikes)"
      - name: unique_cards_swiped
        description: "Distinct cards swiped"
      - name: first_swipe_at
        description: "Timestamp of first swipe"
      - name: last_swipe_at
        description: "Timestamp of last swipe"

  - name: stg_session_saves_by_surface
    description: "Per-session save aggregate pivoted by origin_surface and save_method. Grain: one row per (session_id, user_id). Conservation invariant enforced by test_session_save_surface_conservation: save_count = sum(all pivots). Downstream: fct_session_outcomes, fct_surface_performance."
    columns:
      - name: session_id
        description: "Native session_id"
        tests:
          - not_null
      - name: user_id
        description: "User who saved"
        tests:
          - not_null
      - name: save_count
        description: "Total saves in session"
      - name: primary_save_surface
        description: "Surface with the most saves in this session (ties broken alphabetically)"

  - name: stg_session_multiplayer
    description: "Per-session multiplayer engagement counts (created/joined/voted). Grain: one row per (session_id, user_id). Feeds fct_multiplayer_engagement and fct_session_outcomes."
    columns:
      - name: session_id
        description: "Native session_id"
        tests:
          - not_null
      - name: user_id
        description: "User"
        tests:
          - not_null
      - name: mp_sessions_created
        description: "Multiplayer sessions the user created in this planning session"
      - name: mp_sessions_joined
        description: "Multiplayer sessions the user joined"
      - name: mp_votes_cast
        description: "Votes cast in multiplayer sessions"
      - name: distinct_multiplayer_ids
        description: "Unique multiplayer sessions touched"

  - name: stg_session_dextr
    description: "Per-session Dextr query → result funnel (telemetry era). Grain: one row per (session_id, user_id). Captures the query_submitted → results_viewed step that was previously invisible. Feeds fct_dextr_funnel."
    columns:
      - name: session_id
        description: "Native session_id"
        tests:
          - not_null
      - name: user_id
        description: "User"
        tests:
          - not_null
      - name: queries_submitted
        description: "Dextr queries submitted in this session"
      - name: results_views
        description: "Dextr result pages viewed in this session"
      - name: fast_path_queries
        description: "Queries launched from the suggestion pill shortcut"
      - name: first_query_to_result_seconds
        description: "Heuristic query→result latency (first query to first result view within the same session)"

  - name: stg_session_navigation
    description: "Per-session navigation / browsing aggregate: card views, board views, place detail opens, whats_next taps. Grain: one row per (session_id, user_id). Downstream: fct_session_outcomes, fct_session_explorer."
    columns:
      - name: session_id
        description: "Native session_id"
        tests:
          - not_null
      - name: user_id
        description: "User"
        tests:
          - not_null
      - name: card_view_count
        description: "card_viewed events in session"
      - name: board_view_count
        description: "board_viewed events in session"
      - name: place_detail_view_count
        description: "place_detail_view_open events in session"
      - name: whats_next_tap_count
        description: "whats_next_tapped events in session"

  - name: stg_social_graph_events
    description: "Event-grain social graph edges: user_followed/unfollowed and deck_liked/unliked. Not session-grain because social actions are cross-session. Normalized into (actor_user_id, target_kind, target_id, edge_action). Feeds fct_social_graph and fct_viral_loop."
    columns:
      - name: event_id
        description: "Unique event id from app_events"
        tests:
          - not_null
      - name: event_name
        description: "Raw event_name"
      - name: occurred_at
        description: "Event timestamp"
      - name: actor_user_id
        description: "User who performed the action"
      - name: target_kind
        description: "Target type: 'user' or 'board'"
        tests:
          - accepted_values:
              arguments:
                values: ['user', 'board']
      - name: target_id
        description: "ID of the target user or board"
      - name: edge_action
        description: "'add' (follow/like) or 'remove' (unfollow/unlike)"
        tests:
          - accepted_values:
              arguments:
                values: ['add', 'remove']

  - name: stg_permission_events
    description: "User-grain permission funnel state for deferred_location_* and post_spin_notification_* events. One row per (user_id, permission_type). Feeds fct_permission_funnel."
    columns:
      - name: user_id
        description: "User"
        tests:
          - not_null
      - name: permission_type
        description: "'location' or 'notification'"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['location', 'notification']
      - name: prompts_shown
        description: "Number of times the user saw the permission prompt"
      - name: grants
        description: "Number of times the user granted the permission"
      - name: denials
        description: "Number of times the user denied the permission"
      - name: latest_state
        description: "Latest known state: granted > denied > prompt_shown"
        tests:
          - accepted_values:
              arguments:
                values: ['granted', 'denied', 'prompt_shown']
