version: 2

models:
  - name: gold_recommendation_training_set
    description: >
      Training dataset for Phase 3 ML recommendation system (v2 — multi-surface).
      Each row is a (context, candidate_place, swipe_outcome) tuple from ALL swipe
      surfaces: Dextr AI packs, explore/featured, shared decks, and board review.
      ~35 engineered features across six groups: candidate, prompt, session context,
      interaction, user-level, and place-level features.
      Used to train LightGBM pointwise classifier and LambdaRank models.
    config:
      tags: ['ml', 'recommendation', 'phase3']
    columns:
      # === Identification & Metadata ===
      - name: label
        description: "Target variable: 1 = like, 0 = dislike"
        tests:
          - not_null
          - accepted_values:
              values: [0, 1]
      - name: pack_id
        description: "Group ID for Dextr packs. NULL for non-Dextr swipes (explore, shared decks, etc.)"
      - name: user_id
        description: "User ID for user-level holdout splits"
        tests:
          - not_null
      - name: place_deck_sku
        description: "Join key to places table via deck_sku"
      - name: place_id
        description: "FK to places.id. NULL for unresolved legacy experience cards"
      - name: query_text
        description: "Raw prompt text for NLP features"
      - name: swipe_timestamp
        description: "Timestamp for temporal holdout split (train on all except last 2 weeks)"
        tests:
          - not_null
      - name: data_source
        description: "'current' for dextr_places (2025-11-20+), 'legacy' for dextr_pack_cards (2025-09-05 to 2025-11-19), 'telemetry' for non-Dextr app_events swipes (2026-01-30+)"
        tests:
          - accepted_values:
              values: ['current', 'legacy', 'telemetry']
      - name: origin_surface
        description: "Swipe surface: 'dextr' (AI pack), 'featured' (explore page), 'shared_link' (other user's deck), 'mydecks' (own boards), 'search', 'import', 'other'"
        tests:
          - not_null
      - name: group_key
        description: "Cross-validation grouping key. pack_id for Dextr swipes, session_id for non-Dextr, fallback to user_id. Used for GroupKFold to prevent session leakage"
        tests:
          - not_null

      # === Candidate Features ===
      - name: rating
        description: "Google rating. -1 sentinel for unknown"
      - name: price_level
        description: "Ordinal 1-4. -1 sentinel for unknown (~60% NULL rate)"
      - name: user_ratings_total
        description: "ln(user_ratings_total + 1) log-transformed review count. 0 for unknown"
      - name: primary_category
        description: "First element of DECK categories array. For downstream label encoding"
      - name: num_categories
        description: "Count of DECK categories. Proxy for venue versatility"
      - name: primary_type
        description: "First element of Google types array. For downstream one-hot encoding"
      - name: num_types
        description: "Count of Google types"
      - name: is_reservable
        description: "0/1 boolean. NULL treated as 0"
      - name: is_dine_in
        description: "0/1 boolean. NULL treated as 0"
      - name: serves_brunch
        description: "0/1 boolean. NULL treated as 0"
      - name: serves_beer
        description: "0/1 boolean. NULL treated as 0"
      - name: serves_wine
        description: "0/1 boolean. NULL treated as 0"
      - name: latitude
        description: "Raw latitude coordinate"
      - name: longitude
        description: "Raw longitude coordinate"
      - name: historical_like_rate
        description: "Global like rate for this place across all data, excluding current row to prevent leakage. 0.5 prior for unknown"

      # === Prompt Context Features ===
      - name: prompt_length
        description: "Character length of query_text"
      - name: prompt_word_count
        description: "Approximate word count of query_text"
      - name: prompt_specificity_score
        description: "Heuristic: word_count / 5.0 capped at 1.0"
      - name: extracted_intent
        description: "Keyword-classified prompt intent: dining, drinks, activity, mixed, unknown"

      # === Session Context Features ===
      - name: likes_so_far
        description: "Count of 'like' actions BEFORE this card in the same session/pack (partitioned by group_key)"
      - name: dislikes_so_far
        description: "Count of 'dislike' actions BEFORE this card in the same session/pack"
      - name: like_ratio_so_far
        description: "likes_so_far / total_so_far. 0.5 default when no prior swipes"
      - name: cards_seen_count
        description: "Total cards swiped BEFORE this card in the same session/pack"
      - name: avg_liked_rating
        description: "Mean rating of liked places so far in this session/pack. NULL if no prior likes"
      - name: avg_liked_price
        description: "Mean price_level of liked places so far in this session/pack. NULL if no prior likes"

      # === Interaction Features ===
      - name: category_overlap_with_likes
        description: "1 if this place's primary_category matches any previously-liked place's primary_category in the pack, 0 otherwise"
      - name: price_delta_from_like_avg
        description: "abs(this_place.price_level - avg_liked_price). NULL if either is unknown"
      - name: distance_from_like_centroid_km
        description: "Haversine distance from this place to the mean lat/lng of liked places so far in the session/pack. NULL if no prior likes"

      # === User-Level Features ===
      - name: user_total_saves
        description: "Total places this user has saved to any board (all-time from board_places_v2). 0 for users with no saves"
      - name: user_total_shares
        description: "Total share events by this user (all-time from app_events). 0 for users with no shares"
      - name: user_preferred_rating
        description: "Average Google rating of places this user has saved. NULL for users with no saves"
      - name: user_preferred_price
        description: "Average price_level of places this user has saved. NULL for users with no saves"

      # === Place-Level Features ===
      - name: place_save_count
        description: "Number of distinct users who have saved this place to a board. 0 for unsaved places"
